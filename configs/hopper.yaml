env_name: Hopper-v5
seed: 42
total_timesteps: 1000000

policy:
  hidden_dim: 256
  latent_dim: null  # defaults to action_dim
  K: 4
  sigma_init: 1.0
  learn_sigma: false
  sigma_network: false

ppo:
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  num_rollout_steps: 2048
  num_epochs: 10
  batch_size: 64
  lr: 3.0e-4
  vf_coef: 0.5
  ent_coef: 0.0
  max_grad_norm: 0.5

method:
  mode: holistic  # holistic, per_step_uniform, per_step_learned_global, per_step_state_dependent

eval:
  eval_freq: 10000
  num_eval_episodes: 10

logging:
  log_dir: results/hopper
  save_freq: 100000
  use_tensorboard: true
